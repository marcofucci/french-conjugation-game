<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjuguer — French Verb Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffef9;
    --ink: #1a1208;
    --muted: #8a7d6b;
    --accent: #d4622a;
    --accent2: #2a6dd4;
    --correct: #2d8a5e;
    --wrong: #c0392b;
    --border: #d9d0bf;
    --shadow: 0 2px 0 #c8bfab, 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(212,98,42,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(42,109,212,0.05) 0%, transparent 50%);
  }

  header { text-align: center; margin-bottom: 28px; }
  .logo {
    font-family: 'Fraunces', serif; font-size: 2.8rem;
    font-weight: 900; color: var(--ink); letter-spacing: -1px; line-height: 1;
  }
  .logo span { color: var(--accent); }
  .subtitle {
    font-size: 0.75rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px;
  }

  /* Mode switcher */
  .mode-bar {
    display: flex; gap: 0; margin-bottom: 18px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 4px; box-shadow: var(--shadow);
  }
  .mode-btn {
    font-family: 'DM Mono', monospace; font-size: 0.78rem;
    padding: 7px 18px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all 0.18s; display: flex; align-items: center; gap: 6px;
  }
  .mode-btn:hover { color: var(--ink); }
  .mode-btn.active {
    background: var(--accent); color: white;
    box-shadow: 0 1px 6px rgba(212,98,42,0.3);
  }

  /* Tense bar */
  .tense-bar {
    display: flex; gap: 8px; margin-bottom: 20px;
    flex-wrap: wrap; justify-content: center;
  }
  .tense-btn {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .tense-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tense-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .tense-btn.locked { opacity: 0.4; cursor: not-allowed; }
  .tense-btn.locked:hover { border-color: var(--border); color: var(--muted); }

  /* Stats bar */
  .stats-bar {
    display: flex; align-items: center; gap: 24px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 10px 22px; margin-bottom: 20px;
    box-shadow: var(--shadow); font-size: 0.8rem; color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat strong { color: var(--ink); font-size: 1rem; }
  .stat-divider { width: 1px; height: 20px; background: var(--border); }
  .progress-pill {
    background: var(--accent); color: white; border-radius: 20px;
    padding: 3px 10px; font-size: 0.75rem; font-weight: 500;
  }
  .timer { font-variant-numeric: tabular-nums; }

  /* Card */
  .card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 44px 40px 36px;
    width: 100%; max-width: 660px; box-shadow: var(--shadow);
    position: relative; animation: pop-in 0.25s ease;
  }
  .progress-bar-wrap {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px; border-radius: 20px 20px 0 0; overflow: hidden; background: var(--border);
  }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .question-label {
    font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--muted); margin-bottom: 10px;
  }
  .question-num {
    position: absolute; top: 18px; right: 22px;
    font-size: 0.72rem; color: var(--muted);
  }
  .question {
    font-family: 'Fraunces', serif; font-size: 2.2rem;
    font-weight: 700; color: var(--ink); line-height: 1.2; margin-bottom: 36px;
  }
  .question em { font-style: italic; color: var(--accent); }

  /* Options grid */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .option {
    display: flex; align-items: center; gap: 12px;
    background: #f0ece2; border: 1.5px solid transparent;
    border-radius: 12px; padding: 14px 18px; cursor: pointer;
    transition: all 0.15s; font-family: 'DM Mono', monospace;
    font-size: 0.95rem; color: var(--ink); text-align: left;
  }
  .option:hover:not(:disabled) {
    background: var(--card); border-color: var(--accent);
    transform: translateY(-1px); box-shadow: 0 3px 12px rgba(212,98,42,0.15);
  }
  .option:disabled { cursor: default; }
  .option.correct { background: #e8f5ee; border-color: var(--correct); color: var(--correct); }
  .option.wrong   { background: #fce8e8; border-color: var(--wrong);   color: var(--wrong); }
  .option.reveal  { background: #e8f5ee; border-color: var(--correct); color: var(--correct); }
  .option-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    background: white; border: 1.5px solid var(--border);
    font-size: 0.75rem; color: var(--muted); flex-shrink: 0; transition: all 0.15s;
  }
  .option.correct .option-num { background: var(--correct); border-color: var(--correct); color: white; }
  .option.wrong   .option-num { background: var(--wrong);   border-color: var(--wrong);   color: white; }
  .option.reveal  .option-num { background: var(--correct); border-color: var(--correct); color: white; }

  /* Typing area */
  .typing-area { margin-bottom: 28px; }
  .frog-mascot {
    font-size: 2.8rem;
    display: block;
    text-align: center;
    margin-bottom: 8px;
    user-select: none; line-height: 1;
  }
  .frog-mascot.bounce  { animation: frog-bounce 0.45s ease; }
  .frog-mascot.sad     { animation: frog-shake  0.35s ease; }

  .type-input {
    width: 100%; font-family: 'Fraunces', serif; font-size: 2rem;
    font-weight: 400; color: var(--ink); background: transparent;
    border: none; border-bottom: 2.5px solid var(--border);
    padding: 10px 0; text-align: center; outline: none;
    transition: border-color 0.2s; caret-color: var(--accent);
    display: block; margin-bottom: 10px;
  }
  .type-input::placeholder { color: var(--border); font-style: italic; }
  .type-input:focus  { border-bottom-color: var(--accent2); }
  .type-input.ok     { border-bottom-color: var(--correct); color: var(--correct); }
  .type-input.bad    { border-bottom-color: var(--wrong);   color: var(--wrong); }

  .hint-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.72rem; color: var(--muted);
  }
  .hint-text { font-style: italic; }
  .hint-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted);
    display: flex; align-items: center; gap: 4px; padding: 2px 8px;
    border-radius: 6px; transition: all 0.15s;
  }
  .hint-btn:hover { color: var(--accent2); background: rgba(42,109,212,0.07); }

  /* Feedback */
  .feedback {
    min-height: 28px; font-size: 0.82rem; color: var(--muted);
    text-align: center; opacity: 0; transition: opacity 0.2s; margin-bottom: 8px;
  }
  .feedback.show { opacity: 1; }
  .feedback.correct-msg { color: var(--correct); }
  .feedback.wrong-msg   { color: var(--wrong); }

  /* Bottom bar */
  .bottom-bar {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1.5px dashed var(--border); padding-top: 18px;
  }
  .btn {
    font-family: 'DM Mono', monospace; font-size: 0.82rem;
    padding: 9px 20px; border-radius: 24px; border: 1.5px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px; background: var(--card); color: var(--ink);
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: #b85223; border-color: #b85223; color: white; }
  .skip-badge {
    background: var(--accent); color: white; border-radius: 50%;
    width: 18px; height: 18px; font-size: 0.65rem;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* End screen */
  .end-screen { display: none; text-align: center; padding: 16px 0; }
  .end-screen.show { display: block; }
  .game-area.hide { display: none; }
  .end-title {
    font-family: 'Fraunces', serif; font-size: 3rem;
    font-weight: 900; color: var(--ink); margin-bottom: 8px;
  }
  .end-subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
  .score-big {
    font-family: 'Fraunces', serif; font-size: 5rem;
    font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px;
  }
  .score-label { color: var(--muted); font-size: 0.8rem; margin-bottom: 28px; }
  .end-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; }
  .end-stat { text-align: center; }
  .end-stat-val { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; color: var(--ink); }
  .end-stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .end-btn-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  /* Fireworks */
  #fw-canvas {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 9999; display: none;
  }

  /* Keyframes */
  @keyframes pop-in {
    0%   { transform: scale(0.94); opacity: 0; }
    100% { transform: scale(1);    opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-6px); }
    40%,80%  { transform: translateX(6px); }
  }
  @keyframes frog-bounce {
    0%,100% { transform: translateY(0) scale(1); }
    40%     { transform: translateY(-14px) scale(1.2); }
    70%     { transform: translateY(-4px) scale(0.92); }
  }
  @keyframes frog-shake {
    0%,100% { transform: rotate(0); }
    25%     { transform: rotate(-18deg); }
    75%     { transform: rotate(18deg); }
  }
  .card-shake { animation: shake 0.35s ease; }
</style>
</head>
<body>

<canvas id="fw-canvas"></canvas>

<header>
  <div class="logo">conjuguer<span>.</span></div>
  <div class="subtitle">French Verb Practice</div>
</header>

<!-- Mode switcher -->
<div class="mode-bar">
  <button class="mode-btn active" id="btnModeMultiple" onclick="switchMode('multiple')">☰ Multiple Choice</button>
  <button class="mode-btn"        id="btnModeTyping"   onclick="switchMode('typing')">✎ Type It</button>
</div>

<!-- Tense bar -->
<div class="tense-bar" id="tenseBar"></div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat">⏱ <span class="timer" id="timerDisplay">0:00</span></div>
  <div class="stat-divider"></div>
  <div class="stat">Score: <strong id="scoreDisplay">0/0</strong></div>
  <div class="stat-divider"></div>
  <div class="progress-pill" id="pctDisplay">0%</div>
</div>

<!-- Card -->
<div class="card" id="mainCard">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

  <!-- Game area -->
  <div class="game-area" id="gameArea">
    <div class="question-num"   id="questionNum">1 / 20</div>
    <div class="question-label" id="tenseLabel">le présent</div>


    <div class="question" id="questionText"></div>

    <!-- Multiple choice -->
    <div class="options" id="optionsGrid"></div>

    <!-- Typing -->
    <div class="typing-area" id="typingArea" style="display:none">
      <div class="frog-mascot" id="frogMascot">🐸</div>
      <input class="type-input" id="typeInput" type="text"
             placeholder="answer…" autocomplete="off" autocorrect="off"
             spellcheck="false" autocapitalize="none" />
      <div class="hint-row">
        <span class="hint-text" id="hintText"></span>
        <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 Hint</button>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="bottom-bar">
      <button class="btn"        id="skipBtn"  onclick="skipQ()">→ Skip <span class="skip-badge" id="skipCount">3</span></button>
      <button class="btn btn-primary" id="checkBtn" style="display:none" onclick="checkTyped()">⏎ Check</button>
      <button class="btn btn-primary" id="nextBtn"  style="display:none" onclick="advance()">Next →</button>
    </div>
  </div>

  <!-- End screen -->
  <div class="end-screen" id="endScreen">
    <div class="end-title"    id="endTitle">Bien joué!</div>
    <div class="end-subtitle" id="endSubtitle">You've completed the quiz.</div>
    <div class="score-big"    id="endPct">0%</div>
    <div class="score-label"  id="endScoreLabel">0 correct out of 0</div>
    <div class="end-stats">
      <div class="end-stat"><div class="end-stat-val" id="endTime">—</div><div class="end-stat-lbl">Time</div></div>
      <div class="end-stat"><div class="end-stat-val" id="endCorrect">—</div><div class="end-stat-lbl">Correct</div></div>
      <div class="end-stat"><div class="end-stat-val" id="endSkipped">—</div><div class="end-stat-lbl">Skipped</div></div>
    </div>
    <div class="end-btn-row">
      <button class="btn btn-primary" onclick="restartGame()">↺ Play again</button>
      <button class="btn" onclick="switchMode(currentMode==='multiple'?'typing':'multiple')">⇄ Switch mode</button>
    </div>
  </div>
</div>

<script>
// ================================================================
//  DATA  — add/unlock tenses here
// ================================================================
const TENSES = [
  {
    id: "present", label: "le présent", available: true,
    conjugations: {
      "parler":  { "je":"parle","tu":"parles","il/elle":"parle","nous":"parlons","vous":"parlez","ils/elles":"parlent" },
      "finir":   { "je":"finis","tu":"finis","il/elle":"finit","nous":"finissons","vous":"finissez","ils/elles":"finissent" },
      "être":    { "je":"suis","tu":"es","il/elle":"est","nous":"sommes","vous":"êtes","ils/elles":"sont" },
      "avoir":   { "je":"ai","tu":"as","il/elle":"a","nous":"avons","vous":"avez","ils/elles":"ont" },
      "aller":   { "je":"vais","tu":"vas","il/elle":"va","nous":"allons","vous":"allez","ils/elles":"vont" },
      "manger":  { "je":"mange","tu":"manges","il/elle":"mange","nous":"mangeons","vous":"mangez","ils/elles":"mangent" },
      "vouloir": { "je":"veux","tu":"veux","il/elle":"veut","nous":"voulons","vous":"voulez","ils/elles":"veulent" },
      "pouvoir": { "je":"peux","tu":"peux","il/elle":"peut","nous":"pouvons","vous":"pouvez","ils/elles":"peuvent" },
      "faire":   { "je":"fais","tu":"fais","il/elle":"fait","nous":"faisons","vous":"faites","ils/elles":"font" },
      "oublier": { "je":"oublie","tu":"oublies","il/elle":"oublie","nous":"oublions","vous":"oubliez","ils/elles":"oublient" },
      "prendre": { "je":"prends","tu":"prends","il/elle":"prend","nous":"prenons","vous":"prenez","ils/elles":"prennent" },
      "venir":   { "je":"viens","tu":"viens","il/elle":"vient","nous":"venons","vous":"venez","ils/elles":"viennent" }
    }
  },
  {
    id: "future", label: "le futur", available: false, // ← flip to true to unlock
    conjugations: {
      "parler":  { "je":"parlerai","tu":"parleras","il/elle":"parlera","nous":"parlerons","vous":"parlerez","ils/elles":"parleront" },
      "finir":   { "je":"finirai","tu":"finiras","il/elle":"finira","nous":"finirons","vous":"finirez","ils/elles":"finiront" },
      "être":    { "je":"serai","tu":"seras","il/elle":"sera","nous":"serons","vous":"serez","ils/elles":"seront" },
      "avoir":   { "je":"aurai","tu":"auras","il/elle":"aura","nous":"aurons","vous":"aurez","ils/elles":"auront" },
      "aller":   { "je":"irai","tu":"iras","il/elle":"ira","nous":"irons","vous":"irez","ils/elles":"iront" },
      "faire":   { "je":"ferai","tu":"feras","il/elle":"fera","nous":"ferons","vous":"ferez","ils/elles":"feront" }
    }
  },
  {
    id: "imparfait", label: "l'imparfait", available: false,
    conjugations: { /* fill in when ready */ }
  }
];

// ================================================================
//  CONFIG
// ================================================================
const QUESTIONS_PER_ROUND = 20;
const SKIP_LIMIT = 3;

// ================================================================
//  STATE
// ================================================================
let currentTenseId = "present";
let currentMode    = "multiple";
let questions = [], qIndex = 0, score = 0, skipsLeft = SKIP_LIMIT;
let answered = false, timerInterval = null, elapsedSeconds = 0;
let hintLevel = 0;

// ================================================================
//  MODE SWITCH
// ================================================================
function switchMode(mode) {
  if (currentMode === mode) return;
  currentMode = mode;
  document.getElementById("btnModeMultiple").classList.toggle("active", mode === "multiple");
  document.getElementById("btnModeTyping").classList.toggle("active", mode === "typing");
  restartGame();
}

// ================================================================
//  TENSE TABS
// ================================================================
function buildTenseTabs() {
  const bar = document.getElementById("tenseBar");
  bar.innerHTML = "";
  TENSES.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "tense-btn" + (t.id === currentTenseId ? " active" : "") + (!t.available ? " locked" : "");
    btn.textContent = t.available ? t.label : t.label + " 🔒";
    if (t.available) btn.onclick = () => { currentTenseId = t.id; buildTenseTabs(); restartGame(); };
    bar.appendChild(btn);
  });
}

// ================================================================
//  QUESTION POOL
// ================================================================
function buildQuestions() {
  const tense = TENSES.find(t => t.id === currentTenseId);
  const pool = [];
  for (const [verb, forms] of Object.entries(tense.conjugations)) {
    for (const [pronoun, correct] of Object.entries(forms)) {
      const allForms = Object.values(forms);
      const crossForms = [];
      for (const [ov, of2] of Object.entries(tense.conjugations))
        if (ov !== verb) Object.values(of2).forEach(f => { if (f !== correct) crossForms.push(f); });
      pool.push({ verb, pronoun, correct, allForms, crossForms });
    }
  }
  return pool;
}

function generateDistractors(q, n = 3) {
  let pool = [...new Set(q.allForms.filter(f => f !== q.correct))];
  if (pool.length < n) {
    const extra = shuffle([...new Set(q.crossForms.filter(f => f !== q.correct && !pool.includes(f)))]);
    pool = pool.concat(extra);
  }
  return shuffle(pool).slice(0, n);
}

function buildRound() { return shuffle(buildQuestions()).slice(0, QUESTIONS_PER_ROUND); }

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ================================================================
//  TIMER
// ================================================================
function startTimer() {
  elapsedSeconds = 0; clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    const m = Math.floor(elapsedSeconds / 60), s = String(elapsedSeconds % 60).padStart(2, "0");
    document.getElementById("timerDisplay").textContent = `${m}:${s}`;
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }
function fmtTime(s)  { return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`; }

// ================================================================
//  RENDER
// ================================================================
function renderQuestion() {
  if (qIndex >= questions.length) { endGame(); return; }
  answered = false; hintLevel = 0;

  const q = questions[qIndex];
  const tense = TENSES.find(t => t.id === currentTenseId);

  document.getElementById("tenseLabel").textContent   = tense.label;
  document.getElementById("questionText").innerHTML   = `<em>${q.pronoun}</em> / ${q.verb}`;
  document.getElementById("questionNum").textContent  = `${qIndex + 1} / ${questions.length}`;
  document.getElementById("progressBar").style.width  = Math.round((qIndex / questions.length) * 100) + "%";

  const fb = document.getElementById("feedback");
  fb.textContent = ""; fb.className = "feedback";

  document.getElementById("nextBtn").style.display = "none";

  currentMode === "multiple" ? renderMultiple(q) : renderTyping(q);
  updateStats();
}

// ── Multiple choice ──────────────────────────────────────────
function renderMultiple(q) {
  show("optionsGrid"); hide("typingArea");
  hide("checkBtn"); show("skipBtn");
  document.getElementById("skipBtn").disabled = skipsLeft === 0;

  const opts = shuffle([q.correct, ...generateDistractors(q, 3)]);
  const grid = document.getElementById("optionsGrid");
  grid.innerHTML = "";
  opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `<span class="option-num">${i + 1}</span>${opt}`;
    btn.onclick = () => selectMC(btn, opt, q.correct);
    grid.appendChild(btn);
  });

  document.onkeydown = e => {
    if (answered) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); advance(); } return; }
    const n = parseInt(e.key);
    if (n >= 1 && n <= opts.length) grid.querySelectorAll(".option")[n - 1].click();
  };
}

function selectMC(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  const allBtns = document.getElementById("optionsGrid").querySelectorAll(".option");
  allBtns.forEach(b => b.disabled = true);
  const fb = document.getElementById("feedback");

  if (chosen === correct) {
    btn.classList.add("correct"); score++;
    fb.textContent = "✓ Correct!"; fb.className = "feedback show correct-msg";
    setTimeout(advance, 900);
  } else {
    btn.classList.add("wrong");
    allBtns.forEach(b => { if (b.textContent.trim().slice(1) === correct) b.classList.add("reveal"); });
    fb.textContent = `✗ The correct form is: ${correct}`;
    fb.className = "feedback show wrong-msg";
    shakeCard();
    show("nextBtn"); hide("skipBtn");
  }
  updateStats();
}

// ── Typing ───────────────────────────────────────────────────
function renderTyping(q) {
  hide("optionsGrid"); show("typingArea");
  show("checkBtn"); show("skipBtn");
  document.getElementById("skipBtn").disabled = skipsLeft === 0;
  document.getElementById("hintText").textContent = "";
  show("hintBtn");

  const inp = document.getElementById("typeInput");
  inp.value = ""; inp.className = "type-input"; inp.disabled = false;
  setTimeout(() => inp.focus(), 50);

  document.onkeydown = e => {
    if (e.key === "Enter") { e.preventDefault(); answered ? advance() : checkTyped(); }
  };
}

function checkTyped() {
  if (answered) return;
  const q   = questions[qIndex];
  const inp = document.getElementById("typeInput");
  const typed   = inp.value.trim().toLowerCase();
  const correct = q.correct.toLowerCase();
  if (!typed) return;

  answered = true; inp.disabled = true;
  hide("checkBtn"); hide("hintBtn");
  const fb   = document.getElementById("feedback");
  const frog = document.getElementById("frogMascot");

  if (typed === correct) {
    inp.className = "type-input ok"; score++;
    fb.textContent = "✓ Correct!"; fb.className = "feedback show correct-msg";
    frog.classList.remove("sad"); void frog.offsetWidth; frog.classList.add("bounce");
    setTimeout(() => { frog.classList.remove("bounce"); advance(); }, 950);
  } else {
    inp.className = "type-input bad";
    fb.textContent = `✗ The correct form is: ${q.correct}`;
    fb.className = "feedback show wrong-msg";
    frog.classList.remove("bounce"); void frog.offsetWidth; frog.classList.add("sad");
    setTimeout(() => frog.classList.remove("sad"), 400);
    shakeCard(); show("nextBtn"); hide("skipBtn");
  }
  updateStats();
}

function showHint() {
  const q = questions[qIndex];
  hintLevel++;
  const hints = [
    `Starts with: ${q.correct[0].toUpperCase()}—`,
    `First ${Math.ceil(q.correct.length / 2)} letters: ${q.correct.slice(0, Math.ceil(q.correct.length / 2))}…`,
    `Answer: ${q.correct}`
  ];
  document.getElementById("hintText").textContent = hints[Math.min(hintLevel - 1, 2)];
  if (hintLevel >= 3) hide("hintBtn");
}

// ================================================================
//  ADVANCE / SKIP
// ================================================================
function advance() { qIndex++; renderQuestion(); }

function skipQ() {
  if (skipsLeft <= 0 || answered) return;
  skipsLeft--;
  document.getElementById("skipCount").textContent = skipsLeft;
  qIndex++; renderQuestion();
}

function updateStats() {
  const total = Math.min(qIndex + (answered ? 1 : 0), questions.length);
  const pct   = total === 0 ? 0 : Math.round((score / total) * 100);
  document.getElementById("scoreDisplay").textContent = `${score}/${total}`;
  document.getElementById("pctDisplay").textContent   = pct + "%";
  document.getElementById("skipCount").textContent    = skipsLeft;
}

// ================================================================
//  END GAME
// ================================================================
function endGame() {
  stopTimer();
  hide("gameArea"); show("endScreen");

  const total = questions.length;
  const pct   = Math.round((score / total) * 100);

  document.getElementById("endPct").textContent       = pct + "%";
  document.getElementById("endScoreLabel").textContent = `${score} correct out of ${total}`;
  document.getElementById("endTime").textContent      = fmtTime(elapsedSeconds);
  document.getElementById("endCorrect").textContent   = score;
  document.getElementById("endSkipped").textContent   = SKIP_LIMIT - skipsLeft;
  document.getElementById("progressBar").style.width  = "100%";

  const msgs = [
    [90, "Parfait! 🎉",    "Flawless — you're basically French."],
    [70, "Très bien! 👏",  "Solid work, keep it up!"],
    [50, "Pas mal! 🙂",    "Getting there — one more round!"],
    [0,  "Courage! 💪",    "Practice makes perfect. Try again!"]
  ];
  const [, title, sub] = msgs.find(([min]) => pct >= min);
  document.getElementById("endTitle").textContent    = title;
  document.getElementById("endSubtitle").textContent = sub;

  if (pct >= 70) launchFireworks(pct >= 90 ? 6000 : 3500);
}

// ================================================================
//  RESTART
// ================================================================
function restartGame() {
  stopTimer(); stopFireworks();
  qIndex = 0; score = 0; skipsLeft = SKIP_LIMIT; answered = false;
  document.getElementById("gameArea").classList.remove("hide");
  document.getElementById("endScreen").classList.remove("show");
  document.getElementById("progressBar").style.width  = "0%";
  document.getElementById("timerDisplay").textContent = "0:00";
  questions = buildRound();
  startTimer(); renderQuestion();
}

// ================================================================
//  HELPERS
// ================================================================
function show(id) { document.getElementById(id).style.display = ""; }
function hide(id) { document.getElementById(id).style.display = "none"; }
function shakeCard() {
  const c = document.getElementById("mainCard");
  c.classList.add("card-shake");
  setTimeout(() => c.classList.remove("card-shake"), 400);
}

// ================================================================
//  FIREWORKS
// ================================================================
const fwCanvas = document.getElementById("fw-canvas");
const fwCtx    = fwCanvas.getContext("2d");
let fwRunning = false, fwParticles = [], fwBurstTimer = null, fwRafId = null;
const FW_COLS = ["#d4622a","#2a6dd4","#f5c842","#2d8a5e","#e91e8c","#9c27b0","#00bcd4","#ff5722"];

function resizeFW() { fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight; }
window.addEventListener("resize", resizeFW); resizeFW();

class FWParticle {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    const a = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 6;
    this.vx = Math.cos(a) * spd; this.vy = Math.sin(a) * spd - 2.5;
    this.g = 0.13; this.life = 1; this.decay = 0.011 + Math.random() * 0.013;
    this.r = 3 + Math.random() * 4; this.trail = [];
  }
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 6) this.trail.shift();
    this.vx *= 0.985; this.vy += this.g;
    this.x += this.vx; this.y += this.vy; this.life -= this.decay;
  }
  draw(ctx) {
    this.trail.forEach((p, i) => {
      const alpha = (i / this.trail.length) * this.life * 0.4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, this.r * 0.5 * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = this.col + Math.floor(alpha * 255).toString(16).padStart(2, "0");
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.col + Math.floor(this.life * 255).toString(16).padStart(2, "0");
    ctx.fill();
  }
}

function fwBurst(x, y) {
  const col = FW_COLS[Math.floor(Math.random() * FW_COLS.length)];
  for (let i = 0; i < 70 + Math.floor(Math.random() * 40); i++)
    fwParticles.push(new FWParticle(x, y, col));
}

function fwLoop() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwParticles = fwParticles.filter(p => p.life > 0);
  fwParticles.forEach(p => { p.update(); p.draw(fwCtx); });
  if (fwRunning || fwParticles.length > 0) fwRafId = requestAnimationFrame(fwLoop);
  else { fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height); fwCanvas.style.display = "none"; }
}

function launchFireworks(duration = 4000) {
  fwCanvas.style.display = "block";
  fwRunning = true; fwParticles = [];
  const fire = () => {
    fwBurst(fwCanvas.width * (0.1 + Math.random() * 0.8), fwCanvas.height * (0.1 + Math.random() * 0.55));
  };
  fire(); fwBurstTimer = setInterval(fire, 320);
  fwRafId = requestAnimationFrame(fwLoop);
  setTimeout(stopFireworks, duration);
}

function stopFireworks() {
  fwRunning = false; clearInterval(fwBurstTimer);
}

// ================================================================
//  INIT
// ================================================================
buildTenseTabs();
restartGame();
</script>
